<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';">
  <title>MD → PDF Live Editor</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&family=Lato:wght@400;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">MD → PDF</span>
      <button id="btn-open" title="Open File (Ctrl+O)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1H8l-2-3z"/></svg>
        Open
      </button>
      <button id="btn-save" title="Save (Ctrl+S)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-1 2v4H4V3h8zm-3 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
        Save
      </button>
      <button id="btn-export" title="Export PDF (Ctrl+P)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1v2H1v10h14V3h-4V1H5zm1 2h4v1H6V3zm0 4h6v1H6V7zm0 2h6v1H6V9zm0 2h4v1H6v-1z"/></svg>
        Export PDF
      </button>
    </div>
    <div class="toolbar-right">
      <button id="btn-theme" title="Toggle Theme">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5"/></svg>
        Theme
      </button>
      <div class="view-toggle">
        <button id="btn-split" class="view-btn active" title="Split View">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="6" height="12" rx="1" opacity="0.6"/><rect x="9" y="2" width="6" height="12" rx="1"/></svg>
        </button>
        <button id="btn-preview-only" class="view-btn" title="Preview Only">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="12" rx="1"/></svg>
        </button>
      </div>
      <span id="file-name" class="file-indicator">No file</span>
      <span id="status" class="status-indicator"></span>
    </div>
  </div>

  <!-- Main editor area -->
  <div id="editor-container">
    <!-- Left: Markdown editor -->
    <div id="editor-panel">
      <div class="panel-header">
        <span>MARKDOWN</span>
        <span id="line-count" class="line-info">Lines: 0</span>
      </div>
      <div id="md-toolbar" class="md-toolbar">
        <button data-action="undo" title="Undo (Ctrl+Z)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 7h5a4 4 0 1 1 0 8H7v-2h2a2 2 0 0 0 0-4H5.414l1.293 1.293-.707.707L3 8l3-3 .707.707L5.414 7z"/></svg></button>
        <button data-action="redo" title="Redo (Ctrl+Shift+Z)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M12 7H7a4 4 0 1 0 0 8h2v-2H7a2 2 0 0 1 0-4h4.586l-1.293 1.293.707.707L14 8l-3-3-.707.707L11.586 7z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="cut" title="Cut (Ctrl+X)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5a2.5 2.5 0 0 1 3.16 3.36L8 5.71l.84-.85A2.5 2.5 0 1 1 12.5 6a2.47 2.47 0 0 1-1.66-.64L8 8.21l-2.84 2.85A2.5 2.5 0 1 1 3.5 10c.62 0 1.2.23 1.66.64L8 7.79l2.84-2.85A2.47 2.47 0 0 1 12 4.5a1.5 1.5 0 1 0-1.5-1.5 1.5 1.5 0 0 0 .44 1.06L8 7.01 5.06 4.06A1.5 1.5 0 0 0 5.5 3 1.5 1.5 0 1 0 4 4.5c0 .4.15.76.44 1.06L7 8.01 4.44 10.56A1.5 1.5 0 0 0 4 10.5 1.5 1.5 0 1 0 5.5 12a1.5 1.5 0 0 0 1.06-.44L8 10.21l1.44 1.35A1.5 1.5 0 0 0 10.5 12a1.5 1.5 0 1 0 0-3c-.4 0-.76.15-1.06.44z"/></svg></button>
        <button data-action="copy" title="Copy (Ctrl+C)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6z"/><path d="M2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1H8v1H2V6h1V5H2z"/></svg></button>
        <button data-action="paste" title="Paste (Ctrl+V)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10 1a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-2zM7 1h2v1H7V1zM4 3h8v10H4V3z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="bold" title="Bold (Ctrl+B)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h4.5a3.5 3.5 0 0 1 2.3 6.1A3.5 3.5 0 0 1 9 14H4V2zm2 5h2.5a1.5 1.5 0 0 0 0-3H6v3zm0 2v3h3a1.5 1.5 0 0 0 0-3H6z"/></svg></button>
        <button data-action="italic" title="Italic (Ctrl+I)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6 2h6v2h-2.2l-2.6 8H9v2H3v-2h2.2l2.6-8H6V2z"/></svg></button>
        <button data-action="strikethrough" title="Strikethrough — wrap text in ~~"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3A2.5 2.5 0 0 0 2 5.5h2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1H6.5a2.5 2.5 0 0 0 0 5h3A2.5 2.5 0 0 0 12 8.5h-2a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H14V7H2v1h2.5A2.5 2.5 0 0 0 4.5 3z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="heading" title="Heading — cycle H1 through H6"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2v12h2V9h6v5h2V2h-2v5H5V2H3z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="link" title="Insert Link (Ctrl+K)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H8.65a2 2 0 0 1-1.65.88H4a2 2 0 1 1 0-4h2.354zM9.646 10.5H12a3 3 0 0 0 0-6H9a3 3 0 0 0-2.83 4h1.18A2 2 0 0 1 9 7.12H12a2 2 0 1 1 0 4H9.646z"/></svg></button>
        <button data-action="image" title="Insert Image — ![alt](url)"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M14 2H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zm-1 10H3l3-4 1.5 2 2.5-3 3 5zM5.5 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="code" title="Inline Code — wrap in backticks"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.854 4.854a.5.5 0 1 0-.708-.708l-3.5 3.5a.5.5 0 0 0 0 .708l3.5 3.5a.5.5 0 0 0 .708-.708L2.707 8l3.147-3.146zm4.292 0a.5.5 0 0 1 .708-.708l3.5 3.5a.5.5 0 0 1 0 .708l-3.5 3.5a.5.5 0 0 1-.708-.708L13.293 8l-3.147-3.146z"/></svg></button>
        <button data-action="codeblock" title="Code Block — fenced ```"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM5.854 5.854L3.707 8l2.147 2.146-.708.708-2.5-2.5a.5.5 0 0 1 0-.708l2.5-2.5.708.708zm4.292 0l.708-.708 2.5 2.5a.5.5 0 0 1 0 .708l-2.5 2.5-.708-.708L12.293 8l-2.147-2.146z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="ul" title="Bullet List — unordered list"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="2.5" cy="4" r="1.5"/><circle cx="2.5" cy="8" r="1.5"/><circle cx="2.5" cy="12" r="1.5"/><rect x="6" y="3" width="9" height="2" rx="0.5"/><rect x="6" y="7" width="9" height="2" rx="0.5"/><rect x="6" y="11" width="9" height="2" rx="0.5"/></svg></button>
        <button data-action="ol" title="Numbered List — ordered list"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><text x="1" y="5.5" font-size="5" font-weight="700">1</text><text x="1" y="9.5" font-size="5" font-weight="700">2</text><text x="1" y="13.5" font-size="5" font-weight="700">3</text><rect x="6" y="3" width="9" height="2" rx="0.5"/><rect x="6" y="7" width="9" height="2" rx="0.5"/><rect x="6" y="11" width="9" height="2" rx="0.5"/></svg></button>
        <button data-action="tasklist" title="Task List — checkbox items"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="5" height="5" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 4.5l1 1 2-2" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="3.5" width="7" height="2" rx="0.5"/><rect x="1" y="9" width="5" height="5" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="10.5" width="7" height="2" rx="0.5"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="blockquote" title="Blockquote — prefix with >"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h2v3H2zm0 5h2v3H2zm5-5h2v3H7zm0 5h2v3H7z" opacity="0.4"/><rect x="2" y="2" width="1.5" height="12" rx="0.5"/></svg></button>
        <button data-action="hr" title="Horizontal Rule — insert ---"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="7" width="14" height="2" rx="1"/></svg></button>
        <button data-action="table" title="Table — insert markdown table"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3zm1 1v2h4V4H2zm6 0v2h6V4H8zM2 8v2h4V8H2zm6 0v2h6V8H8zM2 12h4v-1H2v1zm6-1v1h6v-1H8z"/></svg></button>
        <span class="toolbar-sep"></span>
        <button data-action="pagebreak" title="Page Break — insert page break for PDF"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="14" height="5" rx="1" opacity="0.5"/><rect x="1" y="10" width="14" height="5" rx="1" opacity="0.5"/><line x1="1" y1="8" x2="4" y2="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 1"/><line x1="6" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 1"/><line x1="12" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 1"/></svg></button>
        <span class="toolbar-sep"></span>
        <div class="md-toolbar-group" title="PDF Font">
          <span class="md-toolbar-label">Font</span>
          <select id="font-select">
            <option value="system">System Default</option>
            <option value="inter">Inter</option>
            <option value="georgia">Georgia</option>
            <option value="merriweather">Merriweather</option>
            <option value="lato">Lato</option>
          </select>
        </div>
        <span class="toolbar-sep"></span>
        <div class="md-toolbar-group" title="PDF Margins in millimeters">
          <span class="md-toolbar-label">Margins</span>
          <div class="md-margin-inputs">
            <label title="Top margin">T<input type="number" id="margin-top" min="0" max="50" value="8"></label>
            <label title="Bottom margin">B<input type="number" id="margin-bottom" min="0" max="50" value="8"></label>
            <label title="Left margin">L<input type="number" id="margin-left" min="0" max="50" value="8"></label>
            <label title="Right margin">R<input type="number" id="margin-right" min="0" max="50" value="8"></label>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <div class="md-toolbar-group" title="PDF Line Spacing">
          <span class="md-toolbar-label">Spacing</span>
          <div class="md-line-spacing-ctrl">
            <button id="ls-decrease" title="Decrease line spacing">−</button>
            <span id="ls-value">1.4</span>
            <button id="ls-increase" title="Increase line spacing">+</button>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <label class="md-toolbar-checkbox" title="Show page border in exported PDF">
          <input type="checkbox" id="page-border">
          <span>Border</span>
        </label>
      </div>
      <div class="editor-wrapper">
        <div id="line-numbers" class="line-numbers"></div>
        <textarea id="md-editor" spellcheck="false" placeholder="Type or paste markdown here..."></textarea>
      </div>
    </div>

    <!-- Resizer -->
    <div id="resizer"></div>

    <!-- Right: Preview -->
    <div id="preview-panel">
      <div class="panel-header">
        <span>PREVIEW</span>
      </div>
      <div id="preview" class="preview-content"></div>
    </div>
  </div>

  <script src="src/renderer/renderer.js"></script>
</body>
</html>
