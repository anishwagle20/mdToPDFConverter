<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';">
  <title>MD → PDF Live Editor</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&family=Lato:wght@400;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">MD → PDF</span>
      <button id="btn-open" title="Open File (Ctrl+O)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1H8l-2-3z"/></svg>
        Open
      </button>
      <button id="btn-save" title="Save (Ctrl+S)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-1 2v4H4V3h8zm-3 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
        Save
      </button>
      <button id="btn-export" title="Export PDF (Ctrl+P)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1v2H1v10h14V3h-4V1H5zm1 2h4v1H6V3zm0 4h6v1H6V7zm0 2h6v1H6V9zm0 2h4v1H6v-1z"/></svg>
        Export PDF
      </button>
    </div>
    <div class="toolbar-right">
      <button id="btn-settings" title="Export Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.902 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291a1.873 1.873 0 0 0-1.116-2.693l-.318-.094c-.835-.246-.835-1.428 0-1.674l.319-.094a1.873 1.873 0 0 0 1.115-2.692l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.116l.094-.318z"/></svg>
        Settings
      </button>
      <button id="btn-theme" title="Toggle Theme">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5"/></svg>
        Theme
      </button>
      <span id="file-name" class="file-indicator">No file</span>
      <span id="status" class="status-indicator"></span>
    </div>
  </div>

  <!-- Main editor area -->
  <div id="editor-container">
    <!-- Left: Markdown editor -->
    <div id="editor-panel">
      <div class="panel-header">
        <span>MARKDOWN</span>
        <span id="line-count" class="line-info">Lines: 0</span>
      </div>
      <div class="editor-wrapper">
        <div id="line-numbers" class="line-numbers"></div>
        <textarea id="md-editor" spellcheck="false" placeholder="Type or paste markdown here..."></textarea>
      </div>
    </div>

    <!-- Resizer -->
    <div id="resizer"></div>

    <!-- Right: Preview -->
    <div id="preview-panel">
      <div class="panel-header">
        <span>PREVIEW</span>
      </div>
      <div id="preview" class="preview-content"></div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay">
    <div id="settings-panel">
      <h3>Export &amp; Display Settings</h3>
      <div class="settings-group">
        <label>PDF Margins (mm)</label>
        <div class="settings-row">
          <div class="field"><span>Top</span><input type="number" id="margin-top" min="0" max="50" value="8"></div>
          <div class="field"><span>Bottom</span><input type="number" id="margin-bottom" min="0" max="50" value="8"></div>
          <div class="field"><span>Left</span><input type="number" id="margin-left" min="0" max="50" value="8"></div>
          <div class="field"><span>Right</span><input type="number" id="margin-right" min="0" max="50" value="8"></div>
        </div>
      </div>
      <div class="settings-group">
        <label class="settings-checkbox">
          <input type="checkbox" id="page-border">
          Enable page border (visible line around each page)
        </label>
      </div>
      <div class="settings-group">
        <label>Preview Font</label>
        <select id="font-select">
          <option value="system">System Default</option>
          <option value="inter">Inter</option>
          <option value="georgia">Georgia</option>
          <option value="merriweather">Merriweather</option>
          <option value="lato">Lato</option>
        </select>
      </div>
      <div class="settings-actions">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-apply" class="primary">Apply</button>
      </div>
    </div>
  </div>

  <script src="src/renderer/renderer.js"></script>
</body>
</html>
